{% extends "base.html" %}

{% block title %}Login - Xbox History{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 400px;
        margin: 50px auto;
        background-color: #1a1a1a;
        border: 2px solid #107c10;
        padding: 30px;
        border-radius: 8px;
    }
    
    .form-container h1 {
        text-align: center;
        margin-bottom: 20px;
    }
    
    .form-group {
        margin-bottom: 15px;
    }
    
    .form-group label {
        display: block;
        color: #aaa;
        margin-bottom: 5px;
        font-size: 14px;
    }
    
    .form-group input {
        width: 100%;
        padding: 10px;
        background-color: #252525;
        border: 1px solid #107c10;
        color: white;
        border-radius: 4px;
        font-size: 14px;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #0fb100;
        box-shadow: 0 0 5px #107c10;
    }
    
    .form-container button {
        width: 100%;
        margin-top: 20px;
    }
    
    .form-container p {
        text-align: center;
        color: #aaa;
        margin-top: 15px;
        font-size: 14px;
    }
    
    .form-container a {
        color: #107c10;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Login</h1>
    
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        
        <button type="submit" class="button">Login</button>
    </form>
    
    <p>Don't have an account? <a href="/register">Register here</a></p>
</div>
{% endblock %}
